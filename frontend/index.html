<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimodal VLM Evaluator Engine</title>
    <style>
        /* Modern 2026 Design Token Variables */
        :root {
            --bg-main: #0b0f19;
            --bg-card: rgba(17, 24, 39, 0.7);
            --border-glow: rgba(51, 65, 85, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Neon Glow Color Tracks */
            --clr-image: #06b6d4;
            --clr-image-glow: rgba(6, 182, 212, 0.25);
            --clr-video: #a855f7;
            --clr-video-glow: rgba(168, 85, 247, 0.25);
            --clr-action: #10b981;
            --clr-action-glow: rgba(16, 185, 129, 0.3);
        }

        /* Base Resets & Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.06) 0%, transparent 45%);
        }

        .engine-container {
            width: 100%;
            max-width: 700px;
            z-index: 10;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 30%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glassmorphic Cards */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* 2026 Navigation Tabs */
        .tabs-nav {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-btn.active-img {
            background: rgba(6, 182, 212, 0.15);
            color: var(--clr-image);
            border: 1px solid rgba(6, 182, 212, 0.3);
            box-shadow: 0 0 15px var(--clr-image-glow);
        }

        .tab-btn.active-vid {
            background: rgba(168, 85, 247, 0.15);
            color: var(--clr-video);
            border: 1px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 0 15px var(--clr-video-glow);
        }

        /* Modern Form Layout Elements */
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"], select {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* File Upload Interface Area */
        .file-upload-zone {
            position: relative;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            background: rgba(15, 23, 42, 0.3);
            cursor: pointer;
            margin-bottom: 20px;
        }

        .file-upload-zone:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.02);
        }

        .file-upload-zone input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Dynamic Configurations Matrix Cards */
        .matrix-section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 25px 0 10px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .batch-image-config-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 16px;
            margin-top: 12px;
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .batch-image-header {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--clr-image);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Master Matrix Button Trigger */
        .primary-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--clr-action) 0%, #059669 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--clr-action-glow);
            margin-top: 25px;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px var(--clr-action-glow);
        }

        .primary-btn:active { transform: translateY(0); }

        /* Asynchronous Streaming Telemetry Spiders */
        #loading {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top-color: #3b82f6;
            margin: 20px auto 0 auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(300deg); } }

        .helper-text { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }
        .conditional-group { margin-bottom: 20px; }
        .hidden-element { display: none !important; }
    </style>
</head>
<body>

<div class="engine-container">

    <h1>VLM Evaluation Studio</h1>

    <div class="tabs-nav">
        <button type="button" class="tab-btn active-img" id="tab-image" onclick="switchProcessingMode('image')">📷 Batch Image Matrix</button>
        <button type="button" class="tab-btn" id="tab-video" onclick="switchProcessingMode('video')">🎬 Video Gating Node</button>
    </div>

    <div id="loading" class="glass-card" style="display: none;">
        <h2 style="font-size: 1.4rem; font-weight: 700; margin-bottom: 8px;">Processing Pipeline Matrix</h2>
        <div id="status" style="color: var(--clr-image); font-weight: 600; font-size: 0.95rem;">Initializing batch elements...</div>
        <div class="spinner"></div>
    </div>

    <form id="process-form" action="/process" method="post" enctype="multipart/form-data" class="glass-card">
        
        <input type="hidden" name="processing_mode" id="processing_mode" value="image">

        <div class="file-upload-zone">
            <span id="media-label" style="font-weight: 600; font-size: 1rem; color: var(--text-main); display: block;">Drop files here or click to browse</span>
            <span id="media-helper" class="helper-text">Supports bulk multi-image uploading streams</span>
            <input type="file" id="media-input" multiple required accept="image/*">
        </div>

        <div class="conditional-group">
            <label>Vision-Language Foundation Model</label>
            <select name="model_name" required>
                {% for model in models %}
                <option value="{{ model }}">{{ model }}</option>
                {% endfor %}
            </select>
        </div>

        <div id="image-transform-group" class="conditional-group">
            <label>Global Augmentation Operators</label>
            <select name="augmentation_methods" multiple style="height: 140px; font-family: monospace;" required>
                {% for aug in augmentations %}
                <option value="{{ aug }}">⚡ {{ aug }}</option>
                {% endfor %}
            </select>
            <span class="helper-text">Hold Ctrl / Cmd to benchmark multiple variations at once</span>
        </div>

        <div id="dynamic-pairwise-container" class="conditional-group"></div>

        <div id="video-sampling-group" class="conditional-group hidden-element">
            <label>Temporal Keyframe Extraction Strategy</label>
            <select name="video_sampling_method" id="video_sampling_method">
                <option value="1">Method 1: Traditional Codec Baseline (I-Frame Extraction)</option>
                <option value="2">Method 2: Unsupervised Spatial-Diversity Feature Selection (MaxInfo)</option>
                <option value="3">Method 3: Sparse Optical Flow Tracking and Feature Velocity Gating</option>
                <option value="4">Method 4: Latent Trajectory Space Partitioning and Deep Feature Distance</option>
                <option value="5">Method 5: Query-Aware Semantic Token Gating (Q-Frame Framework)</option>
                <option value="6">Method 6: Inference-Time Query-Frame Prioritization (BOLT Framework)</option>
            </select>

            <label style="margin-top: 16px;">2D Frame Modification Filter</label>
            <select name="augmentation_method_video">
                {% for aug in augmentations %}
                <option value="{{ aug }}">{{ aug }}</option>
                {% endfor %}
            </select>

            <label style="margin-top: 16px;">Video prompt / Evaluation query</label>
            <input type="text" id="video-prompt-field" placeholder="e.g., Identify the action or item coordinates...">

            <label style="margin-top: 16px;">Expected Ground Truth Reference</label>
            <input type="text" id="video-gt-field" placeholder="Type verified correct baseline response...">
        </div>

        <button type="submit" class="primary-btn">
            Execute Pipeline Matrix
        </button>

    </form>

</div>

<script>
/**
 * Monitors the file upload zone.
 * Generates an automated form matrix block for each uploaded item.
 */
document.getElementById('media-input').addEventListener('change', function(e) {
    const container = document.getElementById('dynamic-pairwise-container');
    container.innerHTML = "";
    
    const files = e.target.files;
    if (files.length === 0) return;

    const titleBlock = document.createElement('div');
    titleBlock.className = 'matrix-section-title';
    titleBlock.innerHTML = '⚙️ Configure Independent Query Matrix targets';
    container.appendChild(titleBlock);

    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const card = document.createElement('div');
        card.className = 'batch-image-config-card';
        card.innerHTML = `
            <div class="batch-image-header">🖼️ Node [${i + 1}]: ${file.name}</div>
            <div style="margin-bottom:10px;">
                <label style="font-size:0.75rem; color:var(--text-muted);">Evaluation Query Prompt</label>
                <input type="text" class="file-prompt-input" required placeholder="What should VLM look for in ${file.name}?">
            </div>
            <div>
                <label style="font-size:0.75rem; color:var(--text-muted);">Ground Truth Reference</label>
                <input type="text" class="file-gt-input" required placeholder="Type accurate target answer...">
            </div>
        `;
        container.appendChild(card);
    }
});

function switchProcessingMode(mode) {
    const isImage = (mode === 'image');
    
    const imgBtn = document.getElementById('tab-image');
    const vidBtn = document.getElementById('tab-video');
    imgBtn.className = 'tab-btn' + (isImage ? ' active-img' : '');
    vidBtn.className = 'tab-btn' + (!isImage ? ' active-vid' : '');
    
    document.getElementById('processing_mode').value = mode;
    
    const imgGroup = document.getElementById('image-transform-group');
    const pairGroup = document.getElementById('dynamic-pairwise-container');
    const vidGroup = document.getElementById('video-sampling-group');
    const mediaLabel = document.getElementById('media-label');
    const mediaInput = document.getElementById('media-input');
    const mediaHelper = document.getElementById('media-helper');
    
    if (isImage) {
        imgGroup.classList.remove('hidden-element');
        pairGroup.classList.remove('hidden-element');
        vidGroup.classList.add('hidden-element');
        mediaLabel.textContent = "Drop batch images here or click to browse";
        mediaInput.setAttribute('name', 'files');
        mediaInput.setAttribute('multiple', 'multiple');
        mediaInput.setAttribute('accept', 'image/*');
        mediaInput.value = "";
        pairGroup.innerHTML = "";
        document.getElementById('status').style.color = 'var(--clr-image)';
    } else {
        imgGroup.classList.add('hidden-element');
        pairGroup.classList.add('hidden-element');
        vidGroup.classList.remove('hidden-element');
        mediaLabel.textContent = "Drop video clip here or click to browse (.mp4, .avi)";
        mediaInput.setAttribute('name', 'file');
        mediaInput.removeAttribute('multiple');
        mediaInput.setAttribute('accept', 'video/*');
        mediaInput.value = "";
        document.getElementById('status').style.color = 'var(--clr-video)';
    }
}

document.getElementById('process-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const form = e.target;
    const mode = document.getElementById('processing_mode').value;
    const finalFormData = new FormData();
    
    finalFormData.append('processing_mode', mode);
    finalFormData.append('model_name', form.model_name.value);

    if (mode === 'image') {
        const fileInput = document.getElementById('media-input');
        const promptFields = document.getElementsByClassName('file-prompt-input');
        const gtFields = document.getElementsByClassName('file-gt-input');
        
        const augSelect = form.augmentation_methods;
        for (let option of augSelect.options) {
            if (option.selected) finalFormData.append('augmentation_methods', option.value);
        }

        for (let i = 0; i < fileInput.files.length; i++) {
            finalFormData.append('image_files', fileInput.files[i]);
            finalFormData.append('image_prompts', promptFields[i].value);
            finalFormData.append('image_ground_truths', gtFields[i].value);
        }
    } else {
        const fileInput = document.getElementById('media-input');
        if(fileInput.files.length > 0) finalFormData.append('file', fileInput.files[0]);
        
        finalFormData.append('video_sampling_method', form.video_sampling_method.value);
        finalFormData.append('augmentation_method_video', form.augmentation_method_video.value);
        finalFormData.append('prompt', document.getElementById('video-prompt-field').value);
        finalFormData.append('ground_truth', document.getElementById('video-gt-field').value);
    }

    form.style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    
    try {
        const response = await fetch('/process', { method: 'POST', body: finalFormData });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullHtml = '';
        let isCollectingHtml = false;
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop(); 
            
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const data = line.slice(6).trim();
                    if (data.startsWith('ERROR:')) {
                        alert(data);
                        location.reload();
                        return;
                    }
                    if (data === 'DONE') {
                        isCollectingHtml = true;
                        continue;
                    }
                    if (isCollectingHtml) {
                        fullHtml += data + '\n';
                    } else {
                        document.getElementById('status').textContent = data;
                    }
                }
            }
        }

        if (fullHtml.trim().length > 0) {
            document.open();
            document.write(fullHtml);
            document.close();
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Server failure executing task.');
        location.reload();
    }
});

window.addEventListener('DOMContentLoaded', () => {
    switchProcessingMode('image');
});
</script>
</body>
</html>
